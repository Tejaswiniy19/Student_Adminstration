services:
  - type: web
    name: sams-backend
    env: node
    region: oregon
    plan: free
    branch: main
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/auth/login
